<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resolutor Absoluto de Hipérbolas y Sistemas de Posicionamiento</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #0b0f19;
            color: #e2e8f0;
        }
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 25px;
        }
        @media (max-width: 1000px) {
            .main-container { grid-template-columns: 1fr; }
        }
        .card {
            background: #141b2d;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.4);
            border: 1px solid #232d45;
        }
        h1, h2, h3 { color: #ffffff; margin-top: 0; }
        h1 { text-align: center; color: #38bdf8; margin-bottom: 25px; font-size: 2.2em; font-weight: 800; }
        .input-box {
            background: #0f1322;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #1e293b;
        }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 6px; }
        label { font-weight: 600; font-size: 0.9em; color: #94a3b8; }
        input[type="number"], input[type="text"], select {
            width: 100%; padding: 10px; border: 1px solid #334155; border-radius: 6px; 
            box-sizing: border-box; font-size: 1em; background-color: #1e293b; color: #ffffff;
        }
        input:focus, select:focus { border-color: #38bdf8; outline: none; }
        .btn {
            width: 100%; background: #0284c7; color: white; border: none; padding: 14px;
            border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1.1em;
            transition: background 0.2s;
        }
        .btn:hover { background: #0369a1; }
        .paso-a-paso {
            background: #070a13; color: #34d399; padding: 20px;
            border-radius: 6px; font-family: 'Fira Code', 'Courier New', monospace;
            white-space: pre-wrap; font-size: 0.9em; line-height: 1.5; overflow-x: auto;
            border-left: 4px solid #38bdf8;
        }
        .canvas-container { position: relative; height: 520px; width: 100%; }
        .flex-select { display: flex; gap: 10px; align-items: center; margin-bottom: 8px; }
    </style>
</head>
<body>

<h1>Resolutor Universal de Hipérbolas (Sistemas LORAN / Ranging)</h1>

<div class="main-container">
    
    <!-- COLUMNA IZQUIERDA -->
    <div class="card">
        <h2>1. Parámetros Geométricos</h2>
        
        <!-- FOCOS -->
        <div class="input-box">
            <label>Coordenadas de las Estaciones / Focos</label>
            <div class="grid-2">
                <div><label style="font-size:0.8em; color:#38bdf8;">Foco 1 (X₁)</label><input type="number" id="f1x" value="-125"></div>
                <div><label style="font-size:0.8em; color:#38bdf8;">Foco 1 (Y₁)</label><input type="number" id="f1y" value="0"></div>
            </div>
            <div class="grid-2" style="margin-top: 8px;">
                <div><label style="font-size:0.8em; color:#38bdf8;">Foco 2 (X₂)</label><input type="number" id="f2x" value="125"></div>
                <div><label style="font-size:0.8em; color:#38bdf8;">Foco 2 (Y₂)</label><input type="number" id="f2y" value="0"></div>
            </div>
        </div>

        <!-- ENTRADA DINÁMICA DE LA DIFERENCIA CONSTANTE -->
        <div class="input-box">
            <div class="flex-select">
                <label>Método para definir la diferencia constante (2a):</label>
                <select id="metodo_2a" onchange="alternarMetodo2a()" style="width: auto; padding: 4px 8px;">
                    <option value="directo">Distancia Directa (Valor de 2a)</option>
                    <option value="fisica">Tiempo × Velocidad (Δt × v)</option>
                </select>
            </div>
            
            <div id="contenedor_directo">
                <label style="font-size:0.8em;">Valor absoluto del eje real ($|PF_1 - PF_2| = 2a$):</label>
                <input type="number" id="val_2a_directo" value="100.44" step="any">
            </div>
            
            <div id="contenedor_fisica" style="display: none;">
                <div class="grid-2">
                    <div>
                        <label style="font-size:0.8em;">Diferencia de Tiempo ($\Delta t$)</label>
                        <input type="text" id="loran_dt" value="0.00054">
                    </div>
                    <div>
                        <label style="font-size:0.8em;">Velocidad de propagación ($v$)</label>
                        <input type="number" id="loran_v" value="186000" step="any">
                    </div>
                </div>
            </div>
        </div>

        <!-- CONDICIÓN DE INTERCEPCIÓN -->
        <div class="input-box">
            <label>Condición del Objeto a localizar</label>
            <div class="grid-2">
                <div>
                    <label style="font-size:0.8em;">Eje del dato conocido</label>
                    <select id="eje_conocido">
                        <option value="Y">Eje Y (Distancia perpendicular u ordenada)</option>
                        <option value="X">Eje X (Posición lineal o abscisa)</option>
                    </select>
                </div>
                <div>
                    <label style="font-size:0.8em;">Valor de dicha coordenada</label>
                    <input type="number" id="valor_conocido" value="80" step="any">
                </div>
            </div>
        </div>

        <button class="btn" onclick="resolverGeometria()">Procesar Algoritmo Analítico</button>

        <h3 style="margin-top: 25px; color:#34d399;">Memoria de Cálculo:</h3>
        <div class="paso-a-paso" id="procedimiento">Modifica las variables y ejecuta el programa para calcular la solución homogénea.</div>
    </div>

    <!-- COLUMNA DERECHA -->
    <div class="card">
        <h2>2. Visualización Vectorial del Espacio</h2>
        <div class="canvas-container">
            <canvas id="graficaCalculadora"></canvas>
        </div>
    </div>
</div>

<script>
    let chartLoran = null;

    function alternarMetodo2a() {
        const met = document.getElementById('metodo_2a').value;
        document.getElementById('contenedor_directo').style.display = met === 'directo' ? 'block' : 'none';
        document.getElementById('contenedor_fisica').style.display = met === 'fisica' ? 'block' : 'none';
    }

    function resolverGeometria() {
        const f1 = { x: parseFloat(document.getElementById('f1x').value), y: parseFloat(document.getElementById('f1y').value) };
        const f2 = { x: parseFloat(document.getElementById('f2x').value), y: parseFloat(document.getElementById('f2y').value) };
        const metodo = document.getElementById('metodo_2a').value;
        const tipoEje = document.getElementById('eje_conocido').value;
        const valEje = parseFloat(document.getElementById('valor_conocido').value);

        // Determinación dimensionalmente neutra de 2a
        let dist_2a = 0;
        if (metodo === 'directo') {
            dist_2a = parseFloat(document.getElementById('val_2a_directo').value);
        } else {
            const dT = parseFloat(document.getElementById('loran_dt').value);
            const vOnda = parseFloat(document.getElementById('loran_v').value);
            dist_2a = dT * vOnda;
        }

        const a = dist_2a / 2;
        const distFocal_2c = Math.sqrt(Math.pow(f2.x - f1.x, 2) + Math.pow(f2.y - f1.y, 2));
        const c = distFocal_2c / 2;
        const centro = { x: (f1.x + f2.x) / 2, y: (f1.y + f2.y) / 2 };

        if (dist_2a >= distFocal_2c || dist_2a <= 0) {
            document.getElementById('procedimiento').innerHTML = `<span style="color:#ef4444;">[ERROR ALGEBRAICO]: Inconsistencia en la definición del espacio. La diferencia transcurrida (2a = ${dist_2a.toFixed(4)}) debe estar en el intervalo abierto (0, 2c = ${distFocal_2c.toFixed(4)}).</span>`;
            return;
        }

        const bCuadrado = Math.pow(c, 2) - Math.pow(a, 2);
        const b = Math.sqrt(bCuadrado);
        
        // Orientación del eje focal basado en pendientes vectoriales
        let orientacion = (Math.abs(f2.y - f1.y) < Math.abs(f2.x - f1.x)) ? "Horizontal" : "Vertical";

        let barcoPuntos = [];
        let log = `======================================================\n`;
        log += `         MOTOR GEOMÉTRICO DE ALTA PRECISIÓN           \n`;
        log += `======================================================\n\n`;
        log += `[1] PARÁMETROS BASE:\n`;
        log += `   • Eje Transversal (2a) = ${dist_2a.toFixed(4)}\n`;
        log += `   • Semieje Real (a)      = ${a.toFixed(4)}\n`;
        log += `   • Distancia Focal (2c)  = ${distFocal_2c.toFixed(4)} => c = ${c.toFixed(4)}\n`;
        log += `   • Centro Dinámico (h,k) = (${centro.x.toFixed(2)}, ${centro.y.toFixed(2)})\n`;
        log += `   • Semieje Imaginario b  = √(${c.toFixed(4)}² - ${a.toFixed(4)}²) = ${b.toFixed(4)}\n\n`;

        log += `[2] PROYECCIÓN MATRICIAL (HIPÉRBOLA ANCHOR):\n`;
        
        if (orientacion === "Horizontal") {
            log += `   • Modelo Estándar: (x - h)²/a² - (y - k)²/b² = 1\n`;
            log += `   • Ecuación simplificada: (x - ${centro.x})²/${Math.pow(a,2).toFixed(4)} - (y - ${centro.y})²/${bCuadrado.toFixed(4)} = 1\n\n`;
            log += `[3] INTERSECCIÓN ADYACENTE:\n`;

            if (tipoEje === "Y") {
                log += `   • Condición: Interceptando plano en recta constante Y = ${valEje}\n`;
                let termY = Math.pow(valEje - centro.y, 2) / bCuadrado;
                let xCuadrado = Math.pow(a, 2) * (1 + termY);
                let xCalc = Math.sqrt(xCuadrado);
                
                let p1 = centro.x + xCalc;
                let p2 = centro.x - xCalc;
                log += `   • Despeje algebraico:\n     x = h ± a * √(1 + (y - k)²/b²)\n`;
                log += `     x = ${centro.x} ± ${a.toFixed(4)} * √(1 + ${termY.toFixed(4)})\n`;
                log += `     x = ± ${xCalc.toFixed(4)}\n\n`;
                log += `   => COORDENADAS RECONOCIDAS EN EL ESPACIO:\n`;
                log += `      Puntos hallados: (${p1.toFixed(4)}, ${valEje}) y (${p2.toFixed(4)}, ${valEje})\n`;
                
                barcoPuntos.push({ x: p1, y: valEje });
                barcoPuntos.push({ x: p2, y: valEje });
            } else {
                log += `   • Condición: Interceptando plano en recta constante X = ${valEje}\n`;
                if (Math.abs(valEje - centro.x) < a) {
                    log += `   [ERROR]: El valor X evaluado cae dentro del espacio nulo interior del vértice.\n`;
                } else {
                    let termX = Math.pow(valEje - centro.x, 2) / Math.pow(a, 2);
                    let yCuadrado = bCuadrado * (termX - 1);
                    let yCalc = Math.sqrt(yCuadrado);
                    
                    let p1 = centro.y + yCalc;
                    let p2 = centro.y - yCalc;
                    log += `   => COORDENADAS RECONOCIDAS EN EL ESPACIO:\n`;
                    log += `      Puntos hallados: (${valEje}, ${p1.toFixed(4)}) y (${valEje}, ${p2.toFixed(4)})\n`;
                    barcoPuntos.push({ x: valEje, y: p1 });
                    barcoPuntos.push({ x: valEje, y: p2 });
                }
            }
        } else {
            // Modelo Vertical si los focos se alinean en Y
            log += `   • Modelo Estándar: (y - k)²/a² - (x - h)²/b² = 1\n`;
            log += `   • Ecuación simplificada: (y - ${centro.y})²/${Math.pow(a,2).toFixed(4)} - (x - ${centro.x})²/${bCuadrado.toFixed(4)} = 1\n\n`;
            log += `[3] INTERSECCIÓN ADYACENTE:\n`;

            if (tipoEje === "X") {
                let termX = Math.pow(valEje - centro.x, 2) / bCuadrado;
                let yCuadrado = Math.pow(a, 2) * (1 + termX);
                let yCalc = Math.sqrt(yCuadrado);
                log += `   => COORDENADAS RECONOCIDAS EN EL ESPACIO:\n`;
                log += `      Puntos hallados: (${valEje}, ${(centro.y + yCalc).toFixed(4)}) y (${valEje}, ${(centro.y - yCalc).toFixed(4)})\n`;
                barcoPuntos.push({ x: valEje, y: centro.y + yCalc });
                barcoPuntos.push({ x: valEje, y: centro.y - yCalc });
            } else {
                let termY = Math.pow(valEje - centro.y, 2) / Math.pow(a, 2);
                let xCuadrado = bCuadrado * (termY - 1);
                let xCalc = Math.sqrt(xCuadrado);
                log += `   => COORDENADAS RECONOCIDAS EN EL ESPACIO:\n`;
                log += `      Puntos hallados: (${(centro.x + xCalc).toFixed(4)}, ${valEje}) y (${(centro.x - xCalc).toFixed(4)}, ${valEje})\n`;
                barcoPuntos.push({ x: centro.x + xCalc, y: valEje });
                barcoPuntos.push({ x: centro.x - xCalc, y: valEje });
            }
        }

        document.getElementById('procedimiento').innerText = log;

        // Trazar las asíntotas y las curvas de nivel en base al margen dinámico
        let puntosRama1 = [];
        let puntosRama2 = [];
        const maxRango = Math.max(distFocal_2c * 1.6, 200);

        if (orientacion === "Horizontal") {
            for (let x = centro.x - maxRango; x <= centro.x + maxRango; x += maxRango/150) {
                if (Math.abs(x - centro.x) >= a) {
                    let root = Math.pow(x - centro.x, 2) / Math.pow(a, 2) - 1;
                    if (root >= 0) {
                        let yCalc = b * Math.sqrt(root);
                        puntosRama1.push({ x: x, y: centro.y + yCalc });
                        puntosRama2.push({ x: x, y: centro.y - yCalc });
                    }
                }
            }
        } else {
            for (let y = centro.y - maxRango; y <= centro.y + maxRango; y += maxRango/150) {
                if (Math.abs(y - centro.y) >= a) {
                    let root = Math.pow(y - centro.y, 2) / Math.pow(a, 2) - 1;
                    if (root >= 0) {
                        let xCalc = b * Math.sqrt(root);
                        puntosRama1.push({ x: centro.x + xCalc, y: y });
                        puntosRama2.push({ x: centro.x - xCalc, y: y });
                    }
                }
            }
        }

        const ctx = document.getElementById('graficaCalculadora').getContext('2d');
        if (chartLoran) chartLoran.destroy();

        chartLoran = new Chart(ctx, {
            type: 'scatter',
            data: {
                datasets: [
                    { label: 'Centro H(h,k)', data: [centro], backgroundColor: '#e2e8f0', pointRadius: 5, pointStyle: 'rectRot' },
                    { label: 'Foco 1', data: [f1], backgroundColor: '#f43f5e', pointRadius: 8, pointStyle: 'triangle' },
                    { label: 'Foco 2', data: [f2], backgroundColor: '#38bdf8', pointRadius: 8, pointStyle: 'triangle' },
                    { label: 'Intersección Objeto', data: barcoPuntos, backgroundColor: '#34d399', pointRadius: 9, pointStyle: 'circle' },
                    { label: 'Trayectoria Real', data: puntosRama1, borderColor: '#a855f7', showLine: true, pointRadius: 0, borderWidth: 2 },
                    { label: 'Trayectoria Reflejo', data: puntosRama2, borderColor: '#a855f7', showLine: true, pointRadius: 0, borderWidth: 2, borderDash: [5, 5] }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { type: 'linear', min: centro.x - (maxRango*0.75), max: centro.x + (maxRango*0.75), grid: { color: '#1e293b' } },
                    y: { type: 'linear', min: centro.y - (maxRango*0.75), max: centro.y + (maxRango*0.75), grid: { color: '#1e293b' } }
                }
            }
        });
    }

    window.onload = resolverGeometria;
</script>

</body>
</html>
